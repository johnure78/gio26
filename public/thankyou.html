<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | God's Invasion Outreach</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .thankyou-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      background: linear-gradient(135deg, var(--brand-blue-deep), var(--brand-blue));
      color: var(--color-white);
      padding: 2rem;
    }
    
    .thankyou-section h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      margin-bottom: 1rem;
      font-family: var(--font-accent);
    }
    
    .thankyou-section p {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      max-width: 600px;
      opacity: 0.9;
    }
    
    .thankyou-section .btn {
      background: var(--color-white);
      color: var(--brand-blue-deep);
    }
    
    .thankyou-section .btn:hover {
      background: var(--accent-gold-bright);
      color: var(--color-black);
    }
  </style>
</head>
<body>
  <div class="thankyou-section">
    <h1>Thank You!</h1>
    <p>Your sponsorship details have been received. We'll contact you shortly to discuss how you can partner with us in transforming lives.</p>
    <a href="index.html" class="btn btn-primary">Return to Home</a>
  </div>
</body>
</html>
