<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — Messages</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f9;
  margin: 0;
}

header {
  background: #1f2d3d;
  color: white;
  padding: 20px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.container {
  max-width: 1200px;
  margin: 40px auto;
  background: white;
  padding: 25px;
  border-radius: 8px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

h2 {
  margin-top: 0;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #ddd;
  text-align: left;
  font-size: 14px;
}

th {
  background: #f1f3f5;
}

tr:hover {
  background: #fafafa;
}

.status-new {
  color: #e67e22;
  font-weight: bold;
}

button {
  padding: 6px 12px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

.delete-btn {
  background: #e74c3c;
  color: white;
}

.delete-btn:hover {
  background: #c0392b;
}

.loading {
  text-align: center;
  padding: 30px;
  font-size: 18px;
}

@media (max-width: 768px) {
  header {
    font-size: 18px;
    padding: 15px;
  }
  
  .container {
    margin: 10px;
    padding: 15px;
    border-radius: 8px;
  }
  
  .header-row {
    flex-direction: column;
    align-items: stretch;
    text-align: center;
  }
  
  h2 {
    font-size: 20px;
  }
  
  .logout-btn {
    width: 100%;
  }
  
  /* Card view for mobile instead of table */
  .mobile-cards {
    display: block;
  }
  
  table {
    display: none;
  }
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: #666;
}

.empty-state-icon {
  font-size: 48px;
  margin-bottom: 15px;
}

/* Message text truncation */
.message-preview {
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

@media (max-width: 768px) {
  .message-preview {
    max-width: 150px;
  }
}
</style>
</head>

<body>

<header>
  📬 Sponsors Contact Messages Dashboard
</header>

<div class="container">
<h2>All Submissions</h2>
<button onclick="logout()" style="float:right; background:#e74c3c; color:white; padding:8px 16px; border:none; border-radius:4px; cursor:pointer;">Logout</button>

  <div id="loading" class="loading">Loading messages...</div>

  <table id="table" style="display:none;">
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Message</th>
        <th>Status</th>
        <th>Date</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <div id="mobileCards" class="mobile-cards" style="display:none;"></div>

</div>

<script>
// ⭐ PROTECTION: Check token IMMEDIATELY before anything else
const token = localStorage.getItem("adminToken");

if (!token || token === "null" || token === "undefined") {
  // No token found, redirect to login immediately
  window.location.replace("admin-login.html");
  throw new Error("No token - redirecting to login"); // Stop script execution
}

// Token exists, proceed with loading
console.log("Token found, loading admin panel...");

const API_BASE =
  window.location.hostname === "localhost"
    ? "http://localhost:5000"
    : "https://gio26.onrender.com";

async function loadSubmissions() {
  try {
    const res = await fetch(`${API_BASE}/api/admin/submissions`, {
      headers: {
        Authorization: token
      }
    });
    
    // ⭐ Handle 401 (unauthorized) - token expired or invalid
    if (res.status === 401) {
      localStorage.removeItem("adminToken"); // Clear bad token
      window.location.replace("admin-login.html");
      return;
    }
    
    if (!res.ok) {
      throw new Error(`HTTP error! status: ${res.status}`);
    }
    
    const data = await res.json();

    document.getElementById("loading").style.display = "none";
    document.getElementById("table").style.display = "table";
    renderTable(data.submissions || []);

  } catch (err) {
    console.error("Error loading submissions:", err);
    document.getElementById("loading").innerText = "Failed to load messages";
  }
}

function renderTable(submissions) {
  const tbody = document.querySelector("#table tbody");
  tbody.innerHTML = "";

  if (submissions.length === 0) {
    tbody.innerHTML = "<tr><td colspan='7'>No messages found</td></tr>";
    return;
  }

  submissions.forEach(sub => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${sub.name || "N/A"}</td>
      <td>${sub.email || "N/A"}</td>
      <td>${sub.phone || "N/A"}</td>
      <td>${sub.message || "No message"}</td>
      <td class="status-new">${sub.status || "new"}</td>
      <td>${new Date(sub.createdAt).toLocaleString()}</td>
      <td>
        <button class="delete-btn" onclick="deleteMessage('${sub._id}')">Delete</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

async function deleteMessage(id) {
  if (!confirm("Delete this message permanently?")) return;

  try {
    const res = await fetch(`${API_BASE}/api/admin/submissions/${id}`, {
      method: "DELETE",
      headers: {
        Authorization: token
      }
    });
    
    if (res.status === 401) {
      localStorage.removeItem("adminToken");
      window.location.replace("admin-login.html");
      return;
    }
    
    if (!res.ok) {
      throw new Error(`Delete failed: ${res.status}`);
    }
    
    loadSubmissions();
  } catch (err) {
    console.error("Delete error:", err);
    alert("Failed to delete message");
  }
}

// ⭐ ADD LOGOUT FUNCTION
function logout() {
  localStorage.removeItem("adminToken");
  window.location.replace("admin-login.html");
}

// Load data
loadSubmissions();
</script>

</body>
</html>
